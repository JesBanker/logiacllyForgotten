<!DOCTYPE html>
<html>
  <head>
		<link rel="icon" type="image/png" href="logically_icon.png">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
		
        :root {
			/* 定義全站的主色調 (RGB 數值) */
			--main-r: 242;
			--main-g: 227;
			--main-b: 216;
			--main-padR: 20px;
			--main-rgb: 242, 227, 216;
			--main-secColor: 54, 41, 37;
		}
		
		body {
			overflow-x: hidden;
			background-color: #000000;
			color: rgb(var(--main-r), var(--main-g), var(--main-b));
			
			/* Font stays at 16px until the screen grows, 
			then scales at 2% of screen width, 
			but stops growing at 24px */
			font-size: clamp(16px, 1vw + 10px, 20px);
			
			margin: 0px auto;
			font-family: courier, monospace;
			line-height: 1.2;
			text-align: left;
        }
		
		@media (max-width: 600px){
			body {
				font-size: 16px;
			}
		}
		
				
		.max1200 {
			max-width: 1200px;
			margin: 0px auto;
			
			/*
			border-left: 1px solid #f2e3d880;
			
			border-left: 1px solid rgba(242, 227, 216, 0.8);
			
			padding-right: 10px;
			*/
		}
		
		.max1200 p,
		.max1200 h1 {
			padding-left: 30px;
			margin-left: 20px;
			border-left: 1px solid #f2e3d880;
			/*
			border: solid;
			*/
		}
		
		.max1200 hr{
			opacity: 0.25;
		}
		
		.noBorder h1 {
			border-left: none !important; /*force use?*/
			padding-left: 30px;
		}	
		
		p span.voice {
			font-style: italic;
			opacity: 0.8;
			/*
			padding-left: 10px;
			*/
		}
		
		hr {
			border: 0;
			border-top: 1px solid #f2e3d8; /* 使用的文字顏色 */
			margin: 20px 0; /* 增加上下間距 */
			opacity: 0.5;   /* 稍微透明一點點 */
		}
		
		.lNRText{
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
		}
		
		.line {
			display: flex;
			align-items: flex-end
		}
		
		.right {
			text-align: right !important;
		}
		
		.rPadding {
			padding-right: 20px !important;
		}
		
		.date {
			float: right;
			color: rgba(252, 237, 226, 0.40);
			padding-right: var(--padR ,var(--main-paddingR, 20px) );
		}
		
		.op25 {
			opacity: 0.25;
		}
		
		.opacity {
			opacity: var(--op,1);
		}
		
		.c_rgba { /*color rgba*/
			/* 加上透明度，顏色會自動跟隨主色調 */
			color: rgba(
			var(--rgb , var(--main-rgb, 255,255,255)),
			var(--a, 1)
			);
		}		
		
		.game-container{
			width: 100vw;
			max-height: 80vh;

			aspect-ratio: 480 / 360;

			background: rgba(var(--main-rgb, 0, 0, 0), 0.1);
			box-sizing: border-box;
			padding-bottom: 40px;
			
			position: relative;
			left: 50%;
			right: 50%;
			margin-left: -50vw;
			margin-right: -50vw;
			
			padding-left: calc((100vw - 1080px) / 2);
			padding-right: calc((100vw - 1080px) / 2);
		}
		
		.game-container iframe{
			width: 100%;
			height: 100%;
			border: 0;
			display: block;
			
			
		}
		
		@media (max-width: 600px) {
			.game-container {
			/* 1. 修正拼字並調整間距 */
			padding-left: 1vw;
			padding-right: 1vw; /* 修正為 g */
        
			/* 2. 調整高度，確保在手機上不會太長 */
			max-height: 70vh;
        
			/* 3. 如果你用了 100vw 破框法，記得這裡也要維持 */
			width: 100vw;
			margin-left: -50vw;
			left: 50%;
        
			/* 4. 移除圓角（如果你之前有設的話，手機版通常直角比較滿） */
			border-radius: 0;
			}
		}
		

    </style>
  </head>
  <body>
	<div class="max1200 noBorder"><h1>Temp... how do you find here?</h1></div>
    <hr>
	<div class="max1200">
    <p>
      滾動, 結束.<br>

      還滾, 還結.<br>
      時針過了兩個數字.<br>
      仍...沒了.<br>
      同時間.<br>
      沒了.<br>
	  <br>
	</p>
	</div>
	<hr>
	<div class ="max1200">
	 <p>
		平靜, 應該是. <span class="voice">"說話了."</span><br>
		不. <br>
		...對. <br>
		不對. <br> 
		<span class="voice">"他沒回."</span><br>
		...對. <br>
		不對! <br>
		你對. <br>
		不平, 確實是.  <span class ="voice">"說不出."</span><br>
	  <br>
    </p>
	</div>
	<hr>
	<div class="max1200">
		<p class = "lNRText">
			<span>『滑動』</span>
			<span class= "c_rgba rPadding" style="--a: 0.4;"> 23/04/26</span>
		</p>
			<!--<hr style="margin-left: 0px; opacity: 0.5;"> -->
			<hr class="op25"> 
		<p>
			滑動，結束。<br>
			在滑，在結。<br>	
			時針過了兩個數字。<br>
			<br>
			還滑，還結。<br>		
			仍……吧。<br>
			<br>
			滑不動了。<br>
			<br>
			沒了。<br>
			跳秒聲。<br>
			<span class = "voice">“得去睡了。”</span>
		</p>
	</div>
	<br>
	<hr>
	<div class ="max1200">
		<p>
			test
			<span class="date" style="--padR: 60px;">Rtest</span>
		</p>
	</div>
	<br>
	<hr>
	<div class="max1200">
		<span class="noBorder"><h1>scrathch 3D i trying to</h1></span>
		<hr>
		<div class="game-container">
			<iframe src="noWhatCopy.html" title="S3D test"  loading="lazy"></iframe>

	</div>
	<br>
	<hr>
		
  </body>  
</html>
