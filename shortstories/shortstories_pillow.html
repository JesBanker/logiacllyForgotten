	<hr>
	<p class="describe " style="--rgb: var(--describe-rgb)">
	&nbsp;&nbsp;&nbsp;&nbsp;poor Nel<br>
	<br>
	</p>
	<p>
	他躺在床上頭下兩個枕頭，<br>
	戴著眼鏡，床頭燈亮著，<br>
	照在他的左臉，表情平靜的看著天花板。<br>
	<br>
	他轉向左側面朝床頭燈側躺著，<br>
	看著床頭燈旁倒下的相框，表情依舊。<br>
	<br>
	他直起了身子，把一個枕頭移到了他的右邊，隨後躺了回去，<br>
	盯著相相框，表情微動看起來不像開心，他轉了身子，<br>
	朝右邊側躺，面朝剛剛移開的枕頭。<br>
	<br>
	一會兒，<br>
	他聲音減小的說 "這可真是個好..."<br>
	直到我們聽不到。<br>
	<br>
	</p>
