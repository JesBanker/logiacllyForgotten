		<span class = "left title"><h1>無聲</h1></span>
		<span class = "right date">17/04/26</span>
	</div>
	<hr>
	<p> 
	他立坐在床上，<br>
	看向門縫，<br>
	那房裡唯一的光源，<br>
	綠光在他臉上照出了明確的長方形。 <br>
	他轉身背對著光。<br>
	<br>
	他側躺下。<br>
	<br>
	門外音樂夾雜著一點跳秒聲， <br>
	<br>
	和昨天不一樣，<br>
	他下了床。<br>
	<br>
	把門關上，<br>
	只聽腳步聲，<br>
	「噗夫」「喔！」<br>
	<br>
	床單和棉被摩擦的聲音，<br>
	眼鏡放下的聲音，<br>
	<br>
	跳秒聲。<br>
	<br>
	跳秒聲。<br>
	
	</p>
